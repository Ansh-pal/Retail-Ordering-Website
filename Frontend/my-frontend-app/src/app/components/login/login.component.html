<div class="login-container">
  <div class="login-box">
    <h2>Login</h2>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <!-- Login Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" autocomplete="off">
      <!-- Hidden inputs to prevent autofill -->
      <input type="text" style="display: none" />
      <input type="password" style="display: none" />

      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
          class="form-control"
          autocomplete="off"
          [class.is-invalid]="email?.touched && email?.invalid"
        />
        <div *ngIf="email?.touched && email?.invalid" class="error-text">
          <span *ngIf="email?.hasError('required')">Email is required</span>
          <span *ngIf="email?.hasError('email')">Please enter a valid email</span>
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Enter your password"
          class="form-control"
          autocomplete="new-password"
          [class.is-invalid]="password?.touched && password?.invalid"
        />
        <div *ngIf="password?.touched && password?.invalid" class="error-text">
          <span *ngIf="password?.hasError('required')">Password is required</span>
          <span *ngIf="password?.hasError('minlength')"
            >Password must be at least 6 characters</span
          >
        </div>
      </div>

      <!-- Login Button -->
      <button type="submit" class="btn btn-login" [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <!-- Register Link -->
    <div class="register-link">
      <p>
        Don't have an account?
        <button type="button" class="link-button" (click)="onRegister()">Register here</button>
      </p>
    </div>
  </div>
</div>
