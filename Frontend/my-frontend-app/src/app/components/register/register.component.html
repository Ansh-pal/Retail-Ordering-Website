<div class="register-container">
  <div class="register-box">
    <h2>Create Account</h2>

    <!-- Success Message -->
    <div *ngIf="successMessage" class="success-message">
      {{ successMessage }}
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <!-- Registration Form -->
    <form [formGroup]="registerForm" (ngSubmit)="onRegister()" autocomplete="off">
      <!-- Hidden inputs to prevent autofill -->
      <input type="text" style="display: none" />
      <input type="password" style="display: none" />

      <!-- Name Field -->
      <div class="form-group">
        <label for="name">Name:</label>
        <input
          type="text"
          id="name"
          formControlName="name"
          placeholder="Enter your full name"
          class="form-control"
          [class.is-invalid]="name?.touched && name?.invalid"
        />
        <div *ngIf="name?.touched && name?.invalid" class="error-text">
          <span *ngIf="name?.hasError('required')">Name is required</span>
          <span *ngIf="name?.hasError('minlength')">Name must be at least 2 characters</span>
        </div>
      </div>

      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="Enter your email"
          class="form-control"
          autocomplete="off"
          [class.is-invalid]="email?.touched && email?.invalid"
        />
        <div *ngIf="email?.touched && email?.invalid" class="error-text">
          <span *ngIf="email?.hasError('required')">Email is required</span>
          <span *ngIf="email?.hasError('email')">Please enter a valid email</span>
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          placeholder="Enter your password"
          class="form-control"
          autocomplete="new-password"
          [class.is-invalid]="password?.touched && password?.invalid"
        />
        <div *ngIf="password?.touched && password?.invalid" class="error-text">
          <span *ngIf="password?.hasError('required')">Password is required</span>
          <span *ngIf="password?.hasError('minlength')"
            >Password must be at least 6 characters</span
          >
        </div>
      </div>

      <!-- Phone Number Field -->
      <div class="form-group">
        <label for="phoneNo">Phone Number:</label>
        <input
          type="text"
          id="phoneNo"
          formControlName="phoneNo"
          placeholder="Enter 10-digit phone number"
          class="form-control"
          [class.is-invalid]="phoneNo?.touched && phoneNo?.invalid"
        />
        <div *ngIf="phoneNo?.touched && phoneNo?.invalid" class="error-text">
          <span *ngIf="phoneNo?.hasError('required')">Phone number is required</span>
          <span *ngIf="phoneNo?.hasError('pattern')">Phone number must be 10 digits</span>
        </div>
      </div>

      <!-- Register Button -->
      <button type="submit" class="btn btn-register" [disabled]="registerForm.invalid || isLoading">
        {{ isLoading ? 'Registering...' : 'Register' }}
      </button>
    </form>

    <!-- Login Link -->
    <div class="login-link">
      <p>
        Already have an account?
        <button type="button" class="link-button" (click)="onLogin()">Login here</button>
      </p>
    </div>
  </div>
</div>
